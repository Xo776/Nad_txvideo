# 腾讯视频：强制禁用 QUIC（必做）
#
# 现象：开启「HTTP 抓包」时广告消失，关闭后开屏/广告又回来
# 原因：抓包强制走 TCP+MitM；平时 App 用 QUIC(UDP/443) 绕过 MitM，重写脚本根本碰不到包
# 抓包响应头也曾出现：alt-svc: quic=":443"
#
# 用法（二选一）：
# A) 风车 → 配置文件 → 编辑 → 在 [general] 段加入下一行（勿重复）
# B) 或把本文件内容合并进你的主配置 [general]
#
# 改完后：保存 → 关掉抓包模式 → 强杀腾讯视频 → 冷启验证

[general]
# 丢弃 UDP 443 与 QUIC，迫使腾讯视频回落 HTTPS/TCP，MitM+重写才能生效
udp_drop_list=443, QUIC
