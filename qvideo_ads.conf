// ==UserScript==
// @ScriptName        腾讯视频去广告 v1.3
// @Author            custom
// @UpdateTime        2026-07-21
// @Function          整域锁 puui 图床 + 广告网关/贴片/i.video RPC
// @Description       试验：整域 reject *.puui.qpic.cn（封面也可能空白）；另锁 vmmp 多图 CDN
// ==/UserScript==

# ======= 腾讯视频(Qvideo) 去广告 v1.3 ======= #
# 试验项：整域锁死 puui（含 tv/vcover/media-img 等子域）— 封面/海报可能一起挂
# 若首页封面全空白：注释掉「L1-PUUI」整段，更新后再开

# ---------- L1-A：广告网关 / 上报 ---------- #

^https?:\/\/vi\.l\.qq\.com\/ url reject-200
^https?:\/\/(news|lives|us)\.l\.qq\.com\/ url reject-200
^https?:\/\/p\.l\.qq\.com\/ url reject-200
^https?:\/\/sdkreport\.e\.qq\.com\/ url reject-200
^https?:\/\/t\.gdt\.qq\.com\/ url reject-200
^https?:\/\/mi\.gdt\.qq\.com\/ url reject-200
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img
^https?:\/\/wa\.gtimg\.com\/adxcdn\/ url reject-img
^https?:\/\/splashqqlive\.gtimg\.com\/ url reject-img

# ---------- L1-B：开屏 Shiply ---------- #

^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*app_cold_launch_home_splash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*splash url reject-200

# ---------- L1-C：中插 + 贴片流 ---------- #

^https?:\/\/vv\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/vv6\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/.+\/vmind\.qqvideo\.tc\.qq\.com\/ url reject
^https?:\/\/video\.dispatch\.tc\.qq\.com\/.+\.mp4 url reject
^https?:\/\/[^\/]*(vfiles|wfiles|vip\.image\.video)\.(gtimg|qpic)\.cn\/.*promotionTest url reject-img
^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d\.1\.mp4 url reject

# ---------- L1-PUUI：整域锁死（试验）---------- #

# puui.qpic.cn 及全部子域（tv / vcover / media-img / vpic-cover …）
^https?:\/\/([^\/]+\.)?puui\.qpic\.cn\/ url reject-img
# 新抓包里大量 mulpic 运营/广告图
^https?:\/\/vmmp\.qpic\.cn\/ url reject-img

# ---------- L2：i.video 广告 RPC ---------- #

^https?:\/\/i\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js

# ---------- 不拦 ---------- #
# tips.video.qq.com / rdelivery.qq.com

hostname = i.video.qq.com, vi.l.qq.com, news.l.qq.com, lives.l.qq.com, us.l.qq.com, p.l.qq.com, sdkreport.e.qq.com, t.gdt.qq.com, mi.gdt.qq.com, dldir1.qq.com, wa.gtimg.com, splashqqlive.gtimg.com, vv.video.qq.com, vv6.video.qq.com, video.dispatch.tc.qq.com, *.tc.qq.com, *.shiply-cdn.qq.com, video-mobile-tech-1258344701.shiply-cdn.qq.com, vfiles.gtimg.cn, wfiles.gtimg.cn, vip.image.video.qpic.cn, *.puui.qpic.cn, puui.qpic.cn, vmmp.qpic.cn
