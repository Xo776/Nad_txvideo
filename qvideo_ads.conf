// ==UserScript==
// @ScriptName        腾讯视频去广告 v4.9
// @Author            custom
// @UpdateTime        2026-07-21
// @Attention         实验：整域 reject i.video.qq.com。若信息流/频道挂了，下一轮撤回本节恢复脚本改写。
// @Description       v4.9：撤回裸 IP；i.video 整域 reject（脚本仍留在仓库备撤回）
// ==/UserScript==

# ======= 腾讯视频去广告 v4.9 ======= #
# 实验轮：不再维护裸 IP；i.video 整域掐断看副作用
# 撤回方式：删掉下方「8) reject」两行，恢复 script-request/response（见 git 历史 / qvideo_ivideo_*.js）

# --- 1) getvinfo 贴片 --- #
^https?:\/\/(svv|vv|vv6|h5vv6)\.video\.qq\.com\/getvinfo url script-request-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_getvinfo.js
^https?:\/\/(svv|vv|vv6|h5vv6)\.video\.qq\.com\/getvinfo url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_getvinfo_resp.js

# --- 2) 中插 getvmind --- #
^https?:\/\/(vv|vv6|svv)\.video\.qq\.com\/(get|diff)vmind url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_vmind.js

# --- 3) L 域 --- #
^https?:\/\/[^\/]*\.l\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/l\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js

# --- 4) GDT / 上报 / 素材 --- #
^https?:\/\/pgdt\.gtimg\.cn\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/[^\/]*gdtimg\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/[^\/]*\.gdt\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/sdkreport\.e\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/info[46]\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/otheve\.beacon\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/splashqqlive\.gtimg\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/news\.l\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/[^\/]*\.l\.qq\.com\/proxyhttp url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/media-img\.puui\.qpic\.cn\/media_img\/0\/lena\/ url reject-dict
^https?:\/\/ugd\.gtimg\.com\/ url reject-dict

# --- 5) 穿山甲 / iwan --- #
^https?:\/\/[^\/]*pangolin-sdk-toutiao\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/[^\/]*pglstatp-toutiao\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/[^\/]*iwan\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/[^\/]*iwan\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js

# --- 6) 开屏 Shiply --- #
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*[Ss]plash url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*ams_ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js

# --- 7) 贴片流 --- #
^https?:\/\/.+\/vmind\.qqvideo\.tc\.qq\.com\/ url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d(\.1)?\.mp4 url reject
^https?:\/\/[^\/]*smtcdns\.com\/.+vmind url reject

# --- 8) i.video 整域 REJECT（实验；不依赖 body 脚本）--- #
# 备撤回（勿删仓库脚本）：
# ^https?:\/\/i\.video\.qq\.com\/ url script-request-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_req.js
# ^https?:\/\/i\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js
^https?:\/\/i\.video\.qq\.com\/ url reject

hostname = svv.video.qq.com, vv.video.qq.com, vv6.video.qq.com, h5vv6.video.qq.com, i.video.qq.com, *.l.qq.com, l.qq.com, news.l.qq.com, pgdt.gtimg.cn, ugd.gtimg.com, *.gdtimg.com, *.gdt.qq.com, sdkreport.e.qq.com, info4.video.qq.com, info6.video.qq.com, otheve.beacon.qq.com, splashqqlive.gtimg.com, dldir1.qq.com, *.shiply-cdn.qq.com, *.tc.qq.com, *.smtcdns.com, media-img.puui.qpic.cn, *.pangolin-sdk-toutiao.com, *.pglstatp-toutiao.com, *.iwan.qq.com, *.iwan.video.qq.com, iwan.qq.com, s.iwan.qq.com
