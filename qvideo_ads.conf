// ==UserScript==
// @ScriptName        腾讯视频去广告 v1.1
// @Author            custom
// @UpdateTime        2026-07-21
// @Function          去除腾讯视频开屏配置/贴片网关/广告上报（保守版）
// @Description       v1.0 的 i.video.qq.com 脚本透传会破坏二进制 trpc，导致无法登录/首页空白；v1.1 仅保留独立广告域 reject
// ==/UserScript==

# ======= 腾讯视频(Qvideo) 去广告 v1.1（保守）======= #
# L1 only：只拦独立广告域 / CDN / 经典中插接口
# 已禁用 L2：不可对 i.video.qq.com 做 script-analyze-echo + $task.fetch
#   原因：该网关承载登录/首页/频道等全部业务 trpc，且响应为二进制 protobuf；
#   QX $task.fetch 无法可靠透传二进制，会导致无法登录、主页不刷新、模块打不开。

# ---------- L1-A：QAD / 腾讯广告网关 ---------- #

# > 播放贴片/页面广告代理（抓包：buid=vinfoad）
^https?:\/\/vi\.l\.qq\.com\/ url reject-200

# > 信息流/直播等 L 域广告（IPA 预留）
^https?:\/\/(news|lives)\.l\.qq\.com\/ url reject-200

# > 广告 ping / 曝光
^https?:\/\/p\.l\.qq\.com\/ url reject-200

# > AMS / GDT 上报与转化
^https?:\/\/sdkreport\.e\.qq\.com\/ url reject-200
^https?:\/\/t\.gdt\.qq\.com\/ url reject-200

# > 广告素材目录
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img

# ---------- L1-B：开屏 / Shiply 冷启资源 ---------- #

# > 仅拦冷启开屏资源（收窄，避免误伤其它 shiply 包）
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*app_cold_launch_home_splash url reject-200

# ---------- L1-C：经典中插决策 ---------- #

^https?:\/\/vv\.video\.qq\.com\/getvmind url reject-200
^https?:\/\/vv\.video\.qq\.com\/diffvmind url reject-200
^https?:\/\/vv6\.video\.qq\.com\/getvmind url reject-200
^https?:\/\/vv6\.video\.qq\.com\/diffvmind url reject-200

# > 推广测试素材
^https?:\/\/[^\/]*(vfiles|wfiles|vip\.image\.video)\.(gtimg|qpic)\.cn\/.*promotionTest url reject-img

# ---------- L2 已禁用（勿解开）---------- #
# ^https?:\/\/i\.video\.qq\.com\/ url script-analyze-echo-response https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js

# ---------- 明确不拦 ---------- #
# i.video.qq.com     — 登录/首页/频道/动漫等业务总网关
# tips.video.qq.com  — 推送设备注册
# rdelivery.qq.com   — 远程配置总通道

# MITM（已去掉 i.video.qq.com）
hostname = vi.l.qq.com, news.l.qq.com, lives.l.qq.com, p.l.qq.com, sdkreport.e.qq.com, t.gdt.qq.com, dldir1.qq.com, vv.video.qq.com, vv6.video.qq.com, *.shiply-cdn.qq.com, video-mobile-tech-1258344701.shiply-cdn.qq.com, vfiles.gtimg.cn, wfiles.gtimg.cn, vip.image.video.qpic.cn
