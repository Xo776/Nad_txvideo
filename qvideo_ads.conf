// ==UserScript==
// @ScriptName        腾讯视频去广告 v1.2.1
// @Author            custom
// @UpdateTime        2026-07-21
// @Function          独立广告域 reject + i.video 广告 RPC 清空 + puui 广告图路径
// @Description       v1.2.1：按新抓包补充 puui.qpic.cn/iwan_cloud、media_img（不整域拦封面 CDN）
// ==/UserScript==

# ======= 腾讯视频(Qvideo) 去广告 v1.2 ======= #
# L1：独立广告域 / 贴片流 / 开屏资源 — reject
# L2：i.video.qq.com — script-response-body 按 trpc 名清空广告响应；非广告 $done({})
# 仍无法：嵌在首页 MVL 频道 protobuf 里的混排广告卡片（需解析业务包，风险高）

# ---------- L1-A：广告网关 / 上报 ---------- #

^https?:\/\/vi\.l\.qq\.com\/ url reject-200
^https?:\/\/(news|lives|us)\.l\.qq\.com\/ url reject-200
^https?:\/\/p\.l\.qq\.com\/ url reject-200
^https?:\/\/sdkreport\.e\.qq\.com\/ url reject-200
^https?:\/\/t\.gdt\.qq\.com\/ url reject-200
^https?:\/\/mi\.gdt\.qq\.com\/ url reject-200
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img
^https?:\/\/wa\.gtimg\.com\/adxcdn\/ url reject-img
^https?:\/\/splashqqlive\.gtimg\.com\/ url reject-img

# ---------- L1-B：开屏 Shiply ---------- #

^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*app_cold_launch_home_splash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*splash url reject-200

# ---------- L1-C：中插决策 + 贴片广告流（社区常用）---------- #

^https?:\/\/vv\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/vv6\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/.+\/vmind\.qqvideo\.tc\.qq\.com\/ url reject
^https?:\/\/video\.dispatch\.tc\.qq\.com\/.+\.mp4 url reject
^https?:\/\/[^\/]*(vfiles|wfiles|vip\.image\.video)\.(gtimg|qpic)\.cn\/.*promotionTest url reject-img

# > puui 图床上的广告向素材（勿整域拦 puui：封面/海报都走这里）
# iwan 小游戏/导流图
^https?:\/\/[^\/]*puui\.qpic\.cn\/iwan_cloud\/ url reject-img
# media_img / lena 多为运营/广告创意图（新抓包可见）；若误伤正常图再注释
^https?:\/\/(media-img\.)?puui\.qpic\.cn\/media_img\/ url reject-img

# 贴片广告分片（p201 特征）；若偶发卡顿可注释下一行
^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d\.1\.mp4 url reject

# ---------- L2：业务网关内广告 RPC（安全版）---------- #

^https?:\/\/i\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js

# ---------- 不拦 ---------- #
# tips.video.qq.com / rdelivery.qq.com / 非广告 shiply 包

hostname = i.video.qq.com, vi.l.qq.com, news.l.qq.com, lives.l.qq.com, us.l.qq.com, p.l.qq.com, sdkreport.e.qq.com, t.gdt.qq.com, mi.gdt.qq.com, dldir1.qq.com, wa.gtimg.com, splashqqlive.gtimg.com, vv.video.qq.com, vv6.video.qq.com, video.dispatch.tc.qq.com, *.tc.qq.com, *.shiply-cdn.qq.com, video-mobile-tech-1258344701.shiply-cdn.qq.com, vfiles.gtimg.cn, wfiles.gtimg.cn, vip.image.video.qpic.cn, puui.qpic.cn, media-img.puui.qpic.cn
