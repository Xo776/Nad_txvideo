// ==UserScript==
// @ScriptName        腾讯视频去广告 v1.7
// @Author            custom
// @UpdateTime        2026-07-21
// @Function          深挖客户端+抓包：关闭 getvinfo 贴片开关 + 补齐 IPA/社区广告域
// @Description       关键因：svv getvinfo 的 sppreviewtype=1 拉起视频广告；仅拦外围域不够
// ==/UserScript==

# ======= 腾讯视频(Qvideo) 去广告 v1.7 ======= #
# 客户端/抓包结论：
#   1) 视频贴片由 svv.video.qq.com/getvinfo 的 sppreviewtype/spsrt/spadseg 控制
#   2) 开屏/信息流仍走 *.l.qq.com / Shiply splash / QAD / i.video trpc
#   3) IPA 另有 pgdt.gtimg.cn、gdtimg、info4/6、beacon 等

# ---------- A. 播放贴片（最关键，社区验证过）---------- #

# POST body 去贴片参数
^https?:\/\/(vv|vv6|svv|h5vv6)\.video\.qq\.com\/getvinfo url script-request-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_getvinfo.js
# GET query 去贴片参数
^https?:\/\/(vv|vv6|svv|h5vv6)\.video\.qq\.com\/getvinfo url script-request-header https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_getvinfo_url.js

# 中插清单
^https?:\/\/(vv|vv6|svv)\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/.+\/vmind\.qqvideo\.tc\.qq\.com\/ url reject
^https?:\/\/video\.dispatch\.tc\.qq\.com\/.+\.mp4 url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d(\.1)?\.mp4 url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?_p20\d_ url reject
^https?:\/\/[^\/]*smtcdns\.com\/.+(vmind|omts) url reject

# ---------- B. QAD / L 域 / GDT（IPA + 社区）---------- #

^https?:\/\/vi\.l\.qq\.com\/ url reject-200
^https?:\/\/(news|lives|us|p2?)\.l\.qq\.com\/ url reject-200
^https?:\/\/p\.l\.qq\.com\/ url reject-200
^https?:\/\/sdkreport\.e\.qq\.com\/ url reject-200
^https?:\/\/([a-z0-9-]+\.)?gdt\.qq\.com\/ url reject-200
^https?:\/\/mi\.gdt\.qq\.com\/ url reject-200
^https?:\/\/t\.gdt\.qq\.com\/ url reject-200
^https?:\/\/pgdt\.gtimg\.cn\/ url reject-img
^https?:\/\/[^\/]*gdtimg\.com\/ url reject-200
^https?:\/\/adsmind\.gdtimg\.com\/ url reject-200
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img
^https?:\/\/wa\.gtimg\.com\/adxcdn\/ url reject-img
^https?:\/\/splashqqlive\.gtimg\.com\/ url reject-img
^https?:\/\/ads\.privacy\.qq\.com\/ url reject-200

# 广告上报域（社区常用）
^https?:\/\/info[46]\.video\.qq\.com\/ url reject-200
^https?:\/\/otheve\.beacon\.qq\.com\/ url reject-200
^https?:\/\/[^\/]*\.beacon\.qq\.com\/ url reject-200
^https?:\/\/h\.trace\.qq\.com\/ url reject-200

# ---------- C. 开屏 Shiply / AMS ---------- #

^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*[Ss]plash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*app_cold_launch_home_splash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*ams_ url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*AmsImmediate url reject-200

# ---------- D. 图床试验 ---------- #

^https?:\/\/([^\/]+\.)?puui\.qpic\.cn\/ url reject-img
^https?:\/\/vmmp\.qpic\.cn\/ url reject-img
^https?:\/\/[^\/]*(vfiles|wfiles|vip\.image\.video)\.(gtimg|qpic)\.cn\/.*promotionTest url reject-img

# ---------- E. i.video 广告 RPC（Soul 式远程 script-response-body）---------- #

^https?:\/\/i\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js

hostname = i.video.qq.com, vv.video.qq.com, vv6.video.qq.com, svv.video.qq.com, h5vv6.video.qq.com, vi.l.qq.com, news.l.qq.com, lives.l.qq.com, us.l.qq.com, p.l.qq.com, p2.l.qq.com, sdkreport.e.qq.com, *.gdt.qq.com, mi.gdt.qq.com, t.gdt.qq.com, pgdt.gtimg.cn, *.gdtimg.com, adsmind.gdtimg.com, dldir1.qq.com, wa.gtimg.com, splashqqlive.gtimg.com, ads.privacy.qq.com, info4.video.qq.com, info6.video.qq.com, otheve.beacon.qq.com, *.beacon.qq.com, h.trace.qq.com, video.dispatch.tc.qq.com, *.tc.qq.com, *.smtcdns.com, *.shiply-cdn.qq.com, video-mobile-tech-1258344701.shiply-cdn.qq.com, video-public-1258344701.shiply-cdn.qq.com, vfiles.gtimg.cn, wfiles.gtimg.cn, vip.image.video.qpic.cn, *.puui.qpic.cn, puui.qpic.cn, vmmp.qpic.cn
