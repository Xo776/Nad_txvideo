// ==UserScript==
// @ScriptName        腾讯视频去广告 v2.0
// @Author            custom
// @UpdateTime        2026-07-21
// @Function          推倒重来：客户端+抓包最小集（Soul 写法）
// @Description       修复同 URL 双脚本冲突；GetSlotAdData；getvinfo 关贴片；L 域/GDT/vmind
// ==/UserScript==

# ======= 腾讯视频去广告 v2.0（重写）======= #
# 客户端：QADSplash/Feed/Reward 编进主二进制；广告位 RPC=GetSlotAdData
# 抓包：svv getvinfo 的 sppreviewtype=1 拉贴片
# 约束：同一 URL 只允许一条重写（QX）；脚本用远程 raw（同 Soul/byead）

# --- 1) 贴片开关（只改 body，不再挂 header 脚本）--- #
^https?:\/\/(svv|vv|vv6)\.video\.qq\.com\/getvinfo url script-request-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_getvinfo.js

# --- 2) 中插清单 / 贴片流 --- #
^https?:\/\/(vv|vv6|svv)\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/.+\/vmind\.qqvideo\.tc\.qq\.com\/ url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d(\.1)?\.mp4 url reject
^https?:\/\/[^\/]*smtcdns\.com\/.+vmind url reject

# --- 3) QAD / L 域 / GDT（客户端明文 host）--- #
^https?:\/\/[^\/]*\.l\.qq\.com\/ url reject-200
^https?:\/\/l\.qq\.com\/ url reject-200
^https?:\/\/pgdt\.gtimg\.cn\/ url reject-img
^https?:\/\/[^\/]*gdtimg\.com\/ url reject-200
^https?:\/\/[^\/]*\.gdt\.qq\.com\/ url reject-200
^https?:\/\/sdkreport\.e\.qq\.com\/ url reject-200
^https?:\/\/info[46]\.video\.qq\.com\/ url reject-200
^https?:\/\/otheve\.beacon\.qq\.com\/ url reject-200
^https?:\/\/splashqqlive\.gtimg\.com\/ url reject-img
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img

# --- 4) 开屏 Shiply --- #
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*[Ss]plash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*ams_ url reject-200

# --- 5) 广告位 / 激励 RPC（含 GetSlotAdData）--- #
^https?:\/\/i\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js

hostname = svv.video.qq.com, vv.video.qq.com, vv6.video.qq.com, i.video.qq.com, *.l.qq.com, l.qq.com, pgdt.gtimg.cn, *.gdtimg.com, *.gdt.qq.com, sdkreport.e.qq.com, info4.video.qq.com, info6.video.qq.com, otheve.beacon.qq.com, splashqqlive.gtimg.com, dldir1.qq.com, *.shiply-cdn.qq.com, *.tc.qq.com, *.smtcdns.com
