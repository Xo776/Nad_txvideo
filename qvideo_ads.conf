// ==UserScript==
// @ScriptName        腾讯视频去广告 v2.1
// @Author            custom
// @UpdateTime        2026-07-21
// @Function          对照 19:55 抓包：原生改 getvinfo + 清 adpass
// @Description       请求脚本未改到 sppreviewtype；响应 adpass 才是贴片续航关键
// ==/UserScript==

# ======= 腾讯视频去广告 v2.1 ======= #
# 19:55 #1395：svv.../getvinfo POST 仍 sppreviewtype=1 → 远程 request 脚本未生效
# 同响应 vl.vi[0].adpass → noBanner:false，随后拉 media_img/lena 广告图
# 社区成熟写法：QX 原生 request-body（不依赖远程 JS 拉请求体）

# --- 1a) 贴片开关：原生 request-body（三参数分散，各改一次）--- #
^https?:\/\/(svv|vv|vv6|h5vv6)\.video\.qq\.com\/getvinfo url request-body sppreviewtype=\d+ request-body sppreviewtype=0
^https?:\/\/(svv|vv|vv6|h5vv6)\.video\.qq\.com\/getvinfo url request-body spsrt=\d+ request-body spsrt=0
^https?:\/\/(svv|vv|vv6|h5vv6)\.video\.qq\.com\/getvinfo url request-body spadseg=\d+ request-body spadseg=0

# --- 1b) 清响应 adpass（请求/响应分属两阶段，可与 1a 并存）--- #
^https?:\/\/(svv|vv|vv6|h5vv6)\.video\.qq\.com\/getvinfo url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_getvinfo_resp.js

# --- 2) 中插清单 / 贴片流 --- #
^https?:\/\/(vv|vv6|svv)\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/.+\/vmind\.qqvideo\.tc\.qq\.com\/ url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d(\.1)?\.mp4 url reject
^https?:\/\/[^\/]*smtcdns\.com\/.+vmind url reject

# --- 3) QAD / L 域 / GDT（抓包 vi.l.qq.com/proxyhttp buid=onlyad|vinfoad）--- #
^https?:\/\/[^\/]*\.l\.qq\.com\/ url reject-200
^https?:\/\/l\.qq\.com\/ url reject-200
^https?:\/\/pgdt\.gtimg\.cn\/ url reject-img
^https?:\/\/[^\/]*gdtimg\.com\/ url reject-200
^https?:\/\/[^\/]*\.gdt\.qq\.com\/ url reject-200
^https?:\/\/sdkreport\.e\.qq\.com\/ url reject-200
^https?:\/\/info[46]\.video\.qq\.com\/ url reject-200
^https?:\/\/otheve\.beacon\.qq\.com\/ url reject-200
^https?:\/\/splashqqlive\.gtimg\.com\/ url reject-img
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img

# --- 4) 开屏 / AMS Shiply --- #
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*[Ss]plash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*ams_ url reject-200

# --- 5) 广告创意图（19:55 getvinfo 后立刻请求）--- #
^https?:\/\/[^\/]*puui\.qpic\.cn\/media_img\/lena\/ url reject-img
^https?:\/\/media-img\.puui\.qpic\.cn\/ url reject-img

# --- 6) 广告位 / 激励 RPC --- #
^https?:\/\/i\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js

hostname = svv.video.qq.com, vv.video.qq.com, vv6.video.qq.com, h5vv6.video.qq.com, i.video.qq.com, *.l.qq.com, l.qq.com, pgdt.gtimg.cn, *.gdtimg.com, *.gdt.qq.com, sdkreport.e.qq.com, info4.video.qq.com, info6.video.qq.com, otheve.beacon.qq.com, splashqqlive.gtimg.com, dldir1.qq.com, *.shiply-cdn.qq.com, *.tc.qq.com, *.smtcdns.com, *.puui.qpic.cn, media-img.puui.qpic.cn
