# --- 6) 开屏 Shiply --- #
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*[Ss]plash url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
