# --- 7) 贴片流 --- #
^https?:\/\/.+\/vmind\.qqvideo\.tc\.qq\.com\/ url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d(\.1)?\.mp4 url reject
^https?:\/\/[^\/]*smtcdns\.com\/.+vmind url reject

# --- 8) i.video：请求改写 + 响应用 bodyBytes 拆 AdFeedInfo（19:55 实锤）--- #
^https?:\/\/i\.video\.qq\.com\/ url script-request-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_req.js
^https?:\/\/i\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js

hostname = svv.video.qq.com, vv.video.qq.com, vv6.video.qq.com, h5vv6.video.qq.com, i.video.qq.com, *.l.qq.com, l.qq.com, pgdt.gtimg.cn, *.gdtimg.com, *.gdt.qq.com, sdkreport.e.qq.com, info4.video.qq.com, info6.video.qq.com, otheve.beacon.qq.com, splashqqlive.gtimg.com, dldir1.qq.com, *.shiply-cdn.qq.com, *.tc.qq.com, *.smtcdns.com, *.pangolin-sdk-toutiao.com, *.pglstatp-toutiao.com, *.iwan.qq.com, *.iwan.video.qq.com, iwan.qq.com, s.iwan.qq.com
