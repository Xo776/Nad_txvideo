// ==UserScript==
// @ScriptName        腾讯视频去广告 v1.0
// @Author            custom
// @UpdateTime        2026-07-21
// @Function          去除腾讯视频开屏/贴片网关/激励SSP/运营弹层/广告上报
// @Description       基于 Qvideo IPA(9.04.10)+抓包(9.04.05)分析；参考 Soul 策略分层，结合 QX reject / script-analyze-echo-response
// ==/UserScript==

# ======= 腾讯视频(Qvideo) 去广告 ======= #
# 策略分层（对应 QX 能力）：
#   L1 reject-200/dict/img  — 独立广告域、CDN、经典贴片接口（安全、优先）
#   L2 script-analyze-echo  — i.video.qq.com 业务/广告共用网关，按 body 内 trpc 名拦截
#   不做：整域拦 i.video.qq.com / rdelivery.qq.com / tips 注册（会伤业务）

# ---------- L1-A：QAD / 腾讯广告网关（抓包+IPA）---------- #

# > 播放贴片/页面广告代理（抓包：buid=vinfoad）
^https?:\/\/vi\.l\.qq\.com\/ url reject-200

# > 信息流/直播等 L 域广告（IPA 明文；本次抓包未全触发，按 IPA 预留）
^https?:\/\/(news|lives)\.l\.qq\.com\/ url reject-200

# > 广告 ping / 曝光
^https?:\/\/p\.l\.qq\.com\/ url reject-200

# > AMS / GDT 上报与转化
^https?:\/\/sdkreport\.e\.qq\.com\/ url reject-200
^https?:\/\/t\.gdt\.qq\.com\/ url reject-200

# > 广告素材目录
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img

# ---------- L1-B：开屏 / Shiply 冷启资源 ---------- #

# > 冷启首页开屏 FlatBuffer（抓包两次冷启均命中）
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*splash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*app_cold_launch_home_splash url reject-200

# ---------- L1-C：经典贴片 / 中插接口（社区常用，与本包兼容）---------- #

# > 中插广告决策
^https?:\/\/vv\.video\.qq\.com\/getvmind url reject-200
^https?:\/\/vv\.video\.qq\.com\/diffvmind url reject-200
^https?:\/\/vv6\.video\.qq\.com\/getvmind url reject-200
^https?:\/\/vv6\.video\.qq\.com\/diffvmind url reject-200

# > 推广测试素材（抓包可见 promotionTest）
^https?:\/\/[^\/]*(vfiles|wfiles|vip\.image\.video)\.(gtimg|qpic)\.cn\/.*promotionTest url reject-img

# ---------- L2：i.video.qq.com 共用网关（必须用脚本，不可整域 reject）---------- #

# > 按请求体 trpc 方法名拦截广告 RPC，其余 $task.fetch 透传
# > 将下方 raw 链接换成你仓库的实际地址；也可改为本地 Scripts/qvideo_ivideo_ads.js
^https?:\/\/i\.video\.qq\.com\/ url script-analyze-echo-response https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js

# ---------- 可选（默认注释）：贴片广告 MP4 流 ---------- #
# 可能误伤部分正片分片，确认有广告流特征后再解开
# ^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d\.1\.mp4 url reject
# ^https?:\/\/.+?\/vmind\.qqvideo\.tc\.qq\.com\/.+ url reject

# ---------- 明确不拦（注释说明）---------- #
# tips.video.qq.com/device/registerDevice  — 推送设备注册，非纯广告
# rdelivery.qq.com                        — 远程配置总通道，整域拦会伤功能
# playproxy.video.qq.com/monet/           — 本次为播放模型资源，非开屏广告

# MITM 主机名
hostname = i.video.qq.com, vi.l.qq.com, news.l.qq.com, lives.l.qq.com, p.l.qq.com, sdkreport.e.qq.com, t.gdt.qq.com, dldir1.qq.com, vv.video.qq.com, vv6.video.qq.com, *.shiply-cdn.qq.com, video-mobile-tech-1258344701.shiply-cdn.qq.com, vfiles.gtimg.cn, wfiles.gtimg.cn, vip.image.video.qpic.cn
