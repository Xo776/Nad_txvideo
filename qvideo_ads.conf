# ======= 腾讯视频去广告 v4.4 ======= #
# udp_drop 后开屏可消；频道大卡仍出 → 更新本资源（v4.4 加宽 Ad* / pgdt 破坏）
# 勿整域 reject i.video / puui / rdelivery

# --- 1) getvinfo 贴片 --- #
^https?:\/\/(svv|vv|vv6|h5vv6)\.video\.qq\.com\/getvinfo url script-request-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_getvinfo.js
^https?:\/\/(svv|vv|vv6|h5vv6)\.video\.qq\.com\/getvinfo url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_getvinfo_resp.js

# --- 2) 中插 getvmind --- #
^https?:\/\/(vv|vv6|svv)\.video\.qq\.com\/(get|diff)vmind url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_vmind.js

# --- 3) L 域 --- #
^https?:\/\/[^\/]*\.l\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js
^https?:\/\/l\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_block.js

# --- 4) GDT / 上报 / 素材 --- #
