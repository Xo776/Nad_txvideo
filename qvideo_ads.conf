// ==UserScript==
// @ScriptName        腾讯视频去广告 v1.4
// @Author            custom
// @UpdateTime        2026-07-21
// @Function          去空广告位尝试 + 加强视频贴片/中插 + puui 整域
// @Description       图片锁死后仍留空位=广告配置还在；视频广告走 getvmind+vmind 流。v1.4 空 XML 回 getvmind，扩 RPC 过滤
// ==/UserScript==

# ======= 腾讯视频(Qvideo) 去广告 v1.4 ======= #
# 空广告框：素材被拦但位还在 → 靠 L2 清空广告 RPC；首页 MVL 混排位仍可能残留
# 视频广告：getvmind 回空 XML + 拒 vmind/p201 流

# ---------- L1-A：广告网关 / 上报 ---------- #

^https?:\/\/vi\.l\.qq\.com\/ url reject-200
^https?:\/\/(news|lives|us)\.l\.qq\.com\/ url reject-200
^https?:\/\/p\.l\.qq\.com\/ url reject-200
^https?:\/\/sdkreport\.e\.qq\.com\/ url reject-200
^https?:\/\/t\.gdt\.qq\.com\/ url reject-200
^https?:\/\/mi\.gdt\.qq\.com\/ url reject-200
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img
^https?:\/\/wa\.gtimg\.com\/adxcdn\/ url reject-img
^https?:\/\/splashqqlive\.gtimg\.com\/ url reject-img

# ---------- L1-B：开屏 Shiply ---------- #

^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*app_cold_launch_home_splash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*splash url reject-200

# ---------- L1-C：视频贴片 / 中插（加强）---------- #

# 中插决策：回空 XML（比单纯 reject-200 更容易直接跳过广告位）
^https?:\/\/vv\.video\.qq\.com\/(get|diff)vmind url script-echo-response https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_vmind_empty.js
^https?:\/\/vv6\.video\.qq\.com\/(get|diff)vmind url script-echo-response https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_vmind_empty.js
^https?:\/\/svv\.video\.qq\.com\/(get|diff)vmind url script-echo-response https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_vmind_empty.js

# 广告视频流 CDN
^https?:\/\/.+\/vmind\.qqvideo\.tc\.qq\.com\/ url reject
^https?:\/\/.+\/omts\.tc\.qq\.com\/ url reject
^https?:\/\/video\.dispatch\.tc\.qq\.com\/.+\.mp4 url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d(\.1)?\.mp4 url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?_p20\d_ url reject
^https?:\/\/[^\/]*smtcdns\.com\/.+vmind url reject
^https?:\/\/[^\/]*(vfiles|wfiles|vip\.image\.video)\.(gtimg|qpic)\.cn\/.*promotionTest url reject-img

# ---------- L1-PUUI：整域锁死（试验中，你反馈暂无大问题）---------- #

^https?:\/\/([^\/]+\.)?puui\.qpic\.cn\/ url reject-img
^https?:\/\/vmmp\.qpic\.cn\/ url reject-img

# ---------- L2：i.video 广告 RPC（去空位关键）---------- #

^https?:\/\/i\.video\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/Nad_txvideo/main/qvideo_ivideo_ads.js

# ---------- 不拦 ---------- #
# tips.video.qq.com / rdelivery.qq.com / getvinfo（正片信息）

hostname = i.video.qq.com, vi.l.qq.com, news.l.qq.com, lives.l.qq.com, us.l.qq.com, p.l.qq.com, sdkreport.e.qq.com, t.gdt.qq.com, mi.gdt.qq.com, dldir1.qq.com, wa.gtimg.com, splashqqlive.gtimg.com, vv.video.qq.com, vv6.video.qq.com, svv.video.qq.com, video.dispatch.tc.qq.com, *.tc.qq.com, *.smtcdns.com, *.shiply-cdn.qq.com, video-mobile-tech-1258344701.shiply-cdn.qq.com, vfiles.gtimg.cn, wfiles.gtimg.cn, vip.image.video.qpic.cn, *.puui.qpic.cn, puui.qpic.cn, vmmp.qpic.cn
