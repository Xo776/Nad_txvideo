// ==UserScript==
// @ScriptName        腾讯视频去广告 v1.5
// @Author            custom
// @UpdateTime        2026-07-21
// @Function          修复远程脚本失效；开屏加强；贴片改回 reject；角标靠本地 L2
// @Description       QX 会忽略 rewrite 里的远程 script URL，导致 L2/空XML 未生效。v1.5 改本地脚本名 + 纯 reject
// ==/UserScript==

# ======= 腾讯视频(Qvideo) 去广告 v1.5 ======= #
# 【必做】把 qvideo_ivideo_ads.js 拷到：我的iPhone/iCloud → Quantumult X → Scripts
# 远程 raw 脚本在 script-response-body / script-echo-response 下经常不执行

# ---------- L1-A：广告网关 / 上报 ---------- #

^https?:\/\/vi\.l\.qq\.com\/ url reject-200
^https?:\/\/(news|lives|us)\.l\.qq\.com\/ url reject-200
^https?:\/\/p\.l\.qq\.com\/ url reject-200
^https?:\/\/sdkreport\.e\.qq\.com\/ url reject-200
^https?:\/\/t\.gdt\.qq\.com\/ url reject-200
^https?:\/\/mi\.gdt\.qq\.com\/ url reject-200
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img
^https?:\/\/wa\.gtimg\.com\/adxcdn\/ url reject-img
^https?:\/\/splashqqlive\.gtimg\.com\/ url reject-img

# ---------- L1-B：开屏（加强）---------- #

# Shiply 冷启开屏包（含大小写）
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*[Ss]plash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*cold_launch.*[Ss]plash url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*app_cold_launch_home_splash url reject-200
# AMS 即时广告相关 shiply 包（新抓包可见）
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*ams_ url reject-200
^https?:\/\/[^\/]*shiply-cdn\.qq\.com\/.*AmsImmediate url reject-200

# ---------- L1-C：视频贴片 / 中插（全部 reject，不用远程 echo 脚本）---------- #

^https?:\/\/vv\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/vv6\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/svv\.video\.qq\.com\/(get|diff)vmind url reject-200
^https?:\/\/.+\/vmind\.qqvideo\.tc\.qq\.com\/ url reject
^https?:\/\/video\.dispatch\.tc\.qq\.com\/.+\.mp4 url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?p20\d(\.1)?\.mp4 url reject
^https?:\/\/.+?\.tc\.qq\.com\/.+?_p20\d_ url reject
^https?:\/\/[^\/]*smtcdns\.com\/.+vmind url reject
^https?:\/\/[^\/]*(vfiles|wfiles|vip\.image\.video)\.(gtimg|qpic)\.cn\/.*promotionTest url reject-img

# ---------- L1-PUUI ---------- #

^https?:\/\/([^\/]+\.)?puui\.qpic\.cn\/ url reject-img
^https?:\/\/vmmp\.qpic\.cn\/ url reject-img

# ---------- L2：i.video（必须用【本地】脚本文件名）---------- #

^https?:\/\/i\.video\.qq\.com\/ url script-response-body qvideo_ivideo_ads.js

hostname = i.video.qq.com, vi.l.qq.com, news.l.qq.com, lives.l.qq.com, us.l.qq.com, p.l.qq.com, sdkreport.e.qq.com, t.gdt.qq.com, mi.gdt.qq.com, dldir1.qq.com, wa.gtimg.com, splashqqlive.gtimg.com, vv.video.qq.com, vv6.video.qq.com, svv.video.qq.com, video.dispatch.tc.qq.com, *.tc.qq.com, *.smtcdns.com, *.shiply-cdn.qq.com, video-mobile-tech-1258344701.shiply-cdn.qq.com, video-public-1258344701.shiply-cdn.qq.com, vfiles.gtimg.cn, wfiles.gtimg.cn, vip.image.video.qpic.cn, *.puui.qpic.cn, puui.qpic.cn, vmmp.qpic.cn
